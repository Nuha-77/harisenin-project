<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="auth login-bg">

<div class="auth-card">

  <img src="assets/logo.png" class="logo">

  <h2>Masuk</h2>
  <p class="sub">Selamat datang kembali!</p>

  <form id="loginForm">

    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username">

    <label>Kata Sandi</label>
    <div class="input-group">
      <input type="password" id="password" placeholder="Masukkan kata sandi">
      <span class="eye" id="togglePass">👁</span>
    </div>

    <div class="auth-links">
      <span>Belum punya akun? <a href="register.html">Daftar</a></span>
      <a href="#">Lupa kata sandi?</a>
    </div>

    <button type="submit" class="primary">Masuk</button>

    <div class="divider">Atau</div>

    <button type="button" class="google" id="googleLogin">
      <img src="assets/google.png">
      Masuk dengan Google
    </button>

  </form>

</div>

<script src="js/login.js"></script>
</body>
</html>
