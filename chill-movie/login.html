<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page login-bg">

<div class="auth-overlay"></div>

<div class="auth-card">
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="auth-title">Masuk</div>
  <div class="auth-sub">Selamat datang kembali!</div>

  <div class="form-group">
    <input id="loginUser" type="text" placeholder="Username">
  </div>

  <div class="form-group">
    <input id="loginPass" type="password" placeholder="Kata sandi">
    <span class="toggle-password">👁️</span>
  </div>

  <div class="form-row">
    <a href="register.html">Daftar</a>
    <a href="#">Lupa?</a>
  </div>

  <button id="loginBtn" class="btn">Masuk</button>

  <div class="divider">Atau</div>

  <div class="btn-google">
    <img src="assets/google.png"> Google
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
