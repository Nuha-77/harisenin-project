<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page register-bg">

<div class="auth-overlay"></div>

<div class="auth-card">
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="auth-title">Daftar</div>

  <div class="form-group">
    <input id="regUser" type="text" placeholder="Username">
  </div>

  <div class="form-group">
    <input id="regPass" type="password" placeholder="Password">
    <span class="toggle-password">👁️</span>
  </div>

  <div class="form-group">
    <input id="regConfirm" type="password" placeholder="Konfirmasi Password">
    <span class="toggle-password">👁️</span>
  </div>

  <div class="form-row">
    <a href="login.html">Masuk</a>
  </div>

  <button id="registerBtn" class="btn">Daftar</button>

  <div class="divider">Atau</div>

  <div class="btn-google">
    <img src="assets/google.png"> Google
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
